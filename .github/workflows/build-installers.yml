name: Build Installers

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  linux-installers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build and packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential ruby ruby-dev rpm
          sudo gem install --no-document fpm

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Stage install tree
        run: |
          rm -rf package
          mkdir -p package/root
          DESTDIR="$PWD/package/root" cmake --install build --prefix /usr --config Release

      - name: Build Linux installers (Fedora/Arch families)
        run: |
          VERSION=$(python3 - <<'PY'
          import re
          from pathlib import Path
          txt = Path("CMakeLists.txt").read_text(encoding="utf-8")
          m = re.search(r"project\(OpenRCC VERSION ([0-9]+\.[0-9]+\.[0-9]+)", txt)
          if not m:
              raise SystemExit("Could not determine OpenRCC version from CMakeLists.txt")
          print(m.group(1))
          PY
          )
          mkdir -p dist
          fpm -s dir -t rpm -n openrcc -v "$VERSION" --architecture x86_64 \
            --description "OpenRCC control service and SOAP bridge" \
            --depends grpc --depends protobuf --depends spdlog --depends systemd \
            -C package/root usr
          fpm -s dir -t pacman -n openrcc -v "$VERSION" --architecture x86_64 \
            --description "OpenRCC control service and SOAP bridge" \
            --depends grpc --depends protobuf --depends spdlog --depends systemd \
            -C package/root usr
          mv ./*.rpm dist/
          mv ./*.pkg.tar* dist/

      - name: Upload Linux installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openrcc-linux-installers
          path: dist/*

  windows-msi-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco upgrade ninja --yes --no-progress
          choco install wixtoolset --version=3.11.2 --allow-downgrade --yes --no-progress
          $programFilesRoots = @($env:ProgramFiles, ${env:ProgramFiles(x86)}) | Where-Object { $_ -and (Test-Path $_) }
          $wixDir = foreach ($root in $programFilesRoots) {
            Get-ChildItem $root -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -like "WiX Toolset v3*" }
          } | Sort-Object FullName -Descending | Select-Object -First 1
          if ($wixDir) {
            $wixBin = Join-Path $wixDir.FullName "bin"
            $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } elseif (-not (Get-Command candle.exe -ErrorAction SilentlyContinue)) {
            throw "WiX Toolset installation directory not found and candle.exe is not on PATH"
          }

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Build MSI installer
        shell: pwsh
        run: |
          $versionMatch = Select-String -Path CMakeLists.txt -Pattern 'project\(OpenRCC VERSION ([0-9]+\.[0-9]+\.[0-9]+)'
          if (-not $versionMatch) { throw "Could not determine OpenRCC version from CMakeLists.txt" }
          $version = $versionMatch.Matches[0].Groups[1].Value
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          candle.exe -arch x64 -dBuildOutputDir="$pwd\build" -dOpenRCCVersion=$version -out build\openrcc.wixobj packaging\windows\openrcc.wxs
          light.exe -sval -out "dist\openrcc-$version-windows-x64.msi" build\openrcc.wixobj

      - name: Upload Windows MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openrcc-windows-msi
          path: dist/*.msi
